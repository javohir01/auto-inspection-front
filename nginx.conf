server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Laravel backend service.
    # Use Docker's embedded DNS (127.0.0.11) and a variable upstream so nginx
    # starts even if the backend is not up yet, and recovers when it returns.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend "http://backend:8000";
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built static assets aggressively (they are content-hashed).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
